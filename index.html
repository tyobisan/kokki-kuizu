<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌍 くにのはたクイズ</title>
<meta name="theme-color" content="#FFF9F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="くにのはた">
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap');
:root{--sun:#FFD93D;--pink:#FF6B9D;--mint:#4ECDC4;--purple:#9B59B6;--orange:#FF8C42;--green:#6BCB77;--red:#FF4757;--bg:#FFF9F0;--card:#fff;--sh:0 4px 16px rgba(0,0,0,.10);--r:20px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden}
.screen{display:none}.screen.active{display:block}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;position:sticky;top:0;z-index:100;background:rgba(255,249,240,.95);backdrop-filter:blur(8px);border-bottom:2px solid #FFE0B2}
.topbar-title{font-family:'Kaisei Decol',serif;font-size:16px;font-weight:700;color:#E65100;display:flex;align-items:center;gap:5px}
.back-btn{background:none;border:none;font-size:22px;cursor:pointer;padding:2px 6px;border-radius:8px}
.seal-badge{background:var(--sun);color:#7B5800;border-radius:99px;padding:2px 10px;font-size:14px;font-weight:900}
.hw{max-width:480px;margin:0 auto;padding:20px 14px 40px;text-align:center}
.mascot{font-size:72px;display:block;margin-bottom:6px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.htitle{font-family:'Kaisei Decol',serif;font-size:28px;font-weight:700;color:#E65100;line-height:1.2;margin-bottom:4px}
.hsub{font-size:13px;color:#888;margin-bottom:22px}
.rl{font-size:12px;font-weight:700;color:#888;margin-bottom:7px}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:18px}
.chip{padding:6px 13px;border-radius:99px;border:2px solid #ddd;background:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;color:#555}
.chip.on{background:var(--mint);border-color:var(--mint);color:#fff}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.mcard{background:var(--card);border-radius:var(--r);border:3px solid transparent;padding:16px 8px;cursor:pointer;box-shadow:var(--sh);transition:transform .15s;text-align:center}
.mcard:active{transform:scale(.95)}
.mcard .icon{font-size:36px;display:block;margin-bottom:6px}
.mcard .lbl{font-size:14px;font-weight:700;color:#333;line-height:1.3}
.mcard .sub{font-size:10px;color:#999;margin-top:2px}
.cf{border-color:var(--mint)}.ci{border-color:var(--pink)}.ct{border-color:var(--purple)}.cd{border-color:#f59e0b}
.srow{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;color:#888;margin-bottom:8px}
.spts{color:var(--orange);font-size:15px}
.pw{background:#eee;border-radius:99px;height:9px;margin-bottom:12px;overflow:hidden}
.pb{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--mint),var(--purple));transition:width .4s ease}
.bbtn{display:block;width:100%;padding:15px;border-radius:14px;border:none;font-family:inherit;font-size:17px;font-weight:900;cursor:pointer;transition:transform .1s,box-shadow .1s;box-shadow:0 4px 0 rgba(0,0,0,.15)}
.bbtn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.15)}
.bm{background:var(--mint);color:#fff}.bp{background:var(--pink);color:#fff}.bo{background:var(--orange);color:#fff}
/* FLASH */
.fw{max-width:480px;margin:0 auto;padding:14px}
.fcc{background:var(--card);border-radius:22px;box-shadow:0 8px 28px rgba(0,0,0,.12);padding:22px 18px;text-align:center;margin-bottom:14px;cursor:pointer;min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .2s}
.fcc:active{transform:scale(.98)}
.fc-flag{max-width:230px;max-height:145px;width:100%;object-fit:contain;border-radius:8px;border:1px solid #eee}
.fc-name{font-family:'Kaisei Decol',serif;font-size:26px;font-weight:700;color:#222;margin-top:10px}
.fc-ruby{font-size:13px;color:#888;margin-top:3px}
.fc-reg{font-size:11px;color:#bbb;margin-top:5px}
.fc-hint{font-size:12px;color:#ccc;margin-top:14px}
.fcnav{display:flex;gap:10px;align-items:center;justify-content:center}
.navbtn{width:50px;height:50px;border-radius:50%;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--card);box-shadow:var(--sh);transition:transform .1s}
.navbtn:active{transform:scale(.9)}
.vbtn{background:var(--orange);border:none;border-radius:99px;padding:7px 16px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;margin:8px auto 0;display:flex;align-items:center;gap:5px;font-family:inherit}
/* FILL */
.fiw{max-width:480px;margin:0 auto;padding:14px}
.fi-flag{max-width:210px;max-height:135px;width:100%;object-fit:contain;border-radius:10px;border:1px solid #eee;box-shadow:var(--sh);display:block;margin:0 auto 14px}
.fi-prompt{font-size:15px;color:#666;text-align:center;margin-bottom:10px}
.fi-word{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.fich{width:42px;height:50px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:700;position:relative;transition:all .2s}
.fich.blank{background:#f5f5f5;border:2px dashed #ccc}
.fich.blank.active{background:#fff0f5;border:2px solid var(--pink);box-shadow:0 0 0 3px rgba(255,107,157,.2)}
.fich.ok{background:linear-gradient(135deg,#f0fff4,#dcfce7);border:2px solid var(--green);color:var(--green)}
.fich.shown{background:#f0f4ff;border:2px solid #c7d2fe;color:#4338ca}
.hkbd{display:grid;gap:5px;margin-bottom:10px}
.kbtn{height:44px;border-radius:11px;border:2px solid #e5e7eb;background:var(--card);font-size:17px;font-weight:700;cursor:pointer;transition:all .1s;color:#333;font-family:inherit}
.kbtn:active{transform:scale(.92);background:var(--pink);color:#fff;border-color:var(--pink)}
.kdel{background:#fee2e2;border-color:#fca5a5;color:var(--red);font-size:13px}
.fi-fb{text-align:center;font-size:19px;font-weight:900;min-height:30px;margin-bottom:8px}
.fi-fb.ok{color:var(--green)}.fi-fb.ng{color:var(--red)}
.hintbtn{background:#fffbeb;border:2px solid var(--sun);border-radius:99px;padding:5px 13px;font-size:12px;font-weight:700;color:#92400e;cursor:pointer;font-family:inherit}
/* TRACE */
.trw{max-width:480px;margin:0 auto;padding:14px;text-align:center}
.tr-flag{max-width:150px;max-height:95px;width:100%;object-fit:contain;border-radius:8px;border:1px solid #eee;margin:0 auto 10px;display:block}
.tr-prompt{font-size:14px;color:#888;margin-bottom:8px}
.tr-guide{font-size:26px;color:#ddd;letter-spacing:3px;font-weight:700;margin-bottom:7px}
.tr-canvas{border-radius:14px;border:3px solid #e5e7eb;background:#fff;display:block;width:100%;touch-action:none}
.crow{display:flex;gap:7px;justify-content:center;margin-bottom:10px}
.cdot{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s}
.cdot.on{border-color:#333;transform:scale(1.15)}
.szrow{display:flex;gap:7px;justify-content:center;margin-bottom:10px}
.szbtn{width:34px;height:34px;border-radius:50%;border:2px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.szbtn.on{background:var(--purple);border-color:var(--purple)}
.clrbtn{background:#fee2e2;border:2px solid #fca5a5;border-radius:11px;padding:7px 15px;font-size:13px;font-weight:700;color:var(--red);cursor:pointer;font-family:inherit;margin-right:7px}
/* SEALS */
.slw{max-width:480px;margin:0 auto;padding:14px}
.sl-hd{text-align:center;margin-bottom:16px}
.sl-title{font-family:'Kaisei Decol',serif;font-size:22px;font-weight:700;color:#E65100}
.sl-sub{font-size:12px;color:#888}
.sl-book{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.sl-slot{aspect-ratio:1;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #ddd;background:#fafafa;position:relative;overflow:hidden;cursor:pointer;transition:transform .15s}
.sl-slot:active{transform:scale(.95)}
.sl-slot.earned{border:2px solid var(--sun);background:linear-gradient(135deg,#fffbeb,#fef3c7);box-shadow:0 2px 8px rgba(255,211,61,.3)}
.sl-slot.gold{border:2px solid #f59e0b;background:linear-gradient(135deg,#fffde7,#fde68a);box-shadow:0 0 14px rgba(245,158,11,.6);animation:gp 2s ease-in-out infinite}
@keyframes gp{0%,100%{box-shadow:0 0 8px rgba(245,158,11,.4)}50%{box-shadow:0 0 22px rgba(245,158,11,.9)}}
.sl-slot img{width:70%;height:70%;object-fit:contain;border-radius:3px}
.sl-name{font-size:8px;font-weight:700;color:#888;margin-top:2px;text-align:center;line-height:1.1}
.sl-lock{font-size:20px;color:#ccc}
.sl-star{position:absolute;top:2px;right:2px;font-size:11px}
.sl-slot.earned .sl-name,.sl-slot.gold .sl-name{color:#92400e}
/* DICTIONARY */
.dtw{max-width:480px;margin:0 auto;padding:14px}
.dt-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;justify-content:center}
.rowbtn{padding:6px 12px;border-radius:99px;border:2px solid #ddd;background:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;color:#555}
.rowbtn.on{background:#f59e0b;border-color:#f59e0b;color:#fff}
.dt-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dt-card{background:var(--card);border-radius:14px;border:1.5px solid #eee;padding:10px 8px;text-align:center;cursor:pointer;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.dt-card:active{transform:scale(.96)}
.dt-card img{width:100%;max-height:56px;object-fit:contain;border-radius:4px;border:1px solid #eee;margin-bottom:5px}
.dt-kana{font-size:11px;color:#888;margin-bottom:2px}
.dt-name{font-size:13px;font-weight:700;color:#333}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:20px 18px 32px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mo-flag{max-width:200px;max-height:120px;width:100%;object-fit:contain;border-radius:8px;border:1px solid #eee;display:block;margin:0 auto 10px}
.mo-name{font-family:'Kaisei Decol',serif;font-size:24px;font-weight:700;color:#222;text-align:center}
.mo-ruby{font-size:13px;color:#888;text-align:center;margin-bottom:6px}
.mo-reg{font-size:11px;background:#f0f4ff;color:#4338ca;border-radius:99px;padding:3px 10px;display:inline-block;margin-bottom:14px}
.mo-desc{font-size:14px;color:#444;line-height:1.8;background:#fffbeb;border-radius:12px;padding:12px;margin-bottom:14px}
.mapbtn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;border-radius:14px;border:none;background:#34a853;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.mo-close{display:block;width:100%;padding:11px;border-radius:14px;border:2px solid #eee;background:#fff;font-family:inherit;font-size:14px;font-weight:700;color:#888;cursor:pointer;margin-top:8px}
/* MILESTONE */
#gj-ov,#rk-ov{position:fixed;inset:0;z-index:800;display:none;flex-direction:column;align-items:center;justify-content:center}
#gj-ov.show,#rk-ov.show{display:flex}
#gj-ov{background:rgba(0,0,0,.4)}
#rk-ov{background:#080820}
#gj-cv,#rk-cv{position:absolute;inset:0;width:100%;height:100%}
.gj-txt{position:relative;z-index:2;font-family:'Kaisei Decol',serif;font-size:52px;font-weight:700;color:#fff;text-shadow:0 0 24px rgba(255,220,50,.9),0 4px 8px rgba(0,0,0,.4);animation:pi .5s cubic-bezier(.34,1.56,.64,1)}
.gj-sub{position:relative;z-index:2;font-size:18px;font-weight:700;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.4);margin-top:8px}
.rk-emoji{position:relative;z-index:2;font-size:72px;animation:rf 2.5s ease-in forwards}
@keyframes rf{0%{transform:translateY(40px) rotate(-20deg)}100%{transform:translateY(-130vh) rotate(-20deg)}}
.rk-txt{position:relative;z-index:2;font-family:'Kaisei Decol',serif;font-size:28px;font-weight:700;color:#fff;text-align:center;margin-top:14px;text-shadow:0 0 16px rgba(100,180,255,.9)}
.rk-stars{position:relative;z-index:2;font-size:36px;margin-top:16px;animation:tw 1s ease-in-out infinite alternate}
@keyframes tw{from{opacity:.4}to{opacity:1}}
.ms-cont{position:relative;z-index:3;margin-top:26px;padding:11px 26px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.5);border-radius:99px;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;backdrop-filter:blur(4px)}
@keyframes pi{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
/* RESULT */
.res-bg{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center}
.res-bg.show{display:flex}
.res-card{background:#fff;border-radius:26px;padding:28px 24px;text-align:center;max-width:310px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:pi .4s cubic-bezier(.34,1.56,.64,1)}
.res-em{font-size:64px;display:block;margin-bottom:6px}
.res-title{font-family:'Kaisei Decol',serif;font-size:24px;font-weight:700;color:#E65100;margin-bottom:6px}
.res-body{font-size:14px;color:#555;margin-bottom:18px;line-height:1.7;white-space:pre-line}
.rbtns{display:flex;gap:8px;justify-content:center}
.rbtn{padding:11px 18px;border-radius:99px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s}
.rbtn:active{transform:scale(.95)}
.rbtn.p{background:var(--mint);color:#fff}.rbtn.s{background:#f3f4f6;color:#555}
.nsw{margin-bottom:14px}
.nsw img{width:56px;height:56px;object-fit:contain}
#fw-cv{position:fixed;inset:0;z-index:9999;pointer-events:none;display:none}
.fstar{position:fixed;pointer-events:none;z-index:9997;font-size:26px;animation:fsu 1s ease-out forwards}
@keyframes fsu{from{transform:translateY(0) scale(1);opacity:1}to{transform:translateY(-80px) scale(1.3);opacity:0}}
.bounce{animation:pi .5s cubic-bezier(.34,1.56,.64,1)}
.shake{animation:sk .4s}
@keyframes sk{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:99px}
</style>
</head>
<body>
<canvas id="fw-cv"></canvas>
<!-- GOOD JOB -->
<div id="gj-ov"><canvas id="gj-cv"></canvas><div class="gj-txt">✨ Good Job! ✨</div><div class="gj-sub" id="gj-sub">5もんせいかい！</div><button class="ms-cont" id="gj-cont">つぎへ ▶</button></div>
<!-- ROCKET -->
<div id="rk-ov"><canvas id="rk-cv"></canvas><div class="rk-emoji">🚀</div><div class="rk-txt">うちゅうへ<br>しゅっぱつ！</div><div class="rk-stars">✨⭐🌟⭐✨</div><button class="ms-cont" id="rk-cont">つぎへ ▶</button></div>
<!-- RESULT -->
<div class="res-bg" id="res-bg"><div class="res-card"><span class="res-em" id="res-em">🌟</span><div class="res-title" id="res-ti"></div><div class="res-body" id="res-bo"></div><div class="nsw" id="nsw" style="display:none"><div style="font-size:11px;color:#888;margin-bottom:4px">🎁 あたらしいシールをゲット！</div><img id="nsi" src="" alt=""></div><div class="rbtns"><button class="rbtn p" id="res-next">もう一回！</button><button class="rbtn s" onclick="showHome()">ホーム</button></div></div></div>
<!-- DICT MODAL -->
<div class="modal-bg" id="dm-bg" onclick="closeDM(event)"><div class="modal"><img class="mo-flag" id="dm-fl" src="" alt=""><div class="mo-name" id="dm-na"></div><div class="mo-ruby" id="dm-ru"></div><div style="text-align:center"><span class="mo-reg" id="dm-re"></span></div><div style="height:10px"></div><div class="mo-desc" id="dm-de"></div><button class="mapbtn" id="dm-map">🗺️ グーグルマップでみる</button><button class="mo-close" onclick="closeDM()">とじる ✕</button></div></div>
<!-- TOPBAR -->
<div class="topbar"><div class="topbar-title" id="tb-title">🌍 くにのはたクイズ</div><div style="display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:#555">🏷️<span class="seal-badge" id="seal-n">0</span></div></div>
<!-- HOME -->
<div class="screen active" id="s-home"><div class="hw"><span class="mascot">🌎</span><div class="htitle">くにのはた<br>クイズ！</div><div class="hsub">せかいのくにをおぼえよう</div><div class="rl">ちいきをえらぼう</div><div class="chips" id="rchips"></div><div class="mgrid"><div class="mcard cf" onclick="startFlash()"><span class="icon">🃏</span><div class="lbl">フラッシュカード</div><div class="sub">みておぼえよう</div></div><div class="mcard ci" onclick="startFill()"><span class="icon">✏️</span><div class="lbl">もじあわせ</div><div class="sub">こたえをいれよう</div></div><div class="mcard ct" onclick="startTrace()"><span class="icon">🖊️</span><div class="lbl">なぞりがき</div><div class="sub">もじをかこう</div></div><div class="mcard cd" onclick="startDict()"><span class="icon">📚</span><div class="lbl">じてん</div><div class="sub">あいうえおでしらべる</div></div></div><div style="background:var(--card);border-radius:var(--r);border:3px solid var(--sun);padding:14px 8px;cursor:pointer;box-shadow:var(--sh);text-align:center" onclick="showSeals()"><span style="font-size:36px;display:block;margin-bottom:5px">📖</span><div style="font-size:14px;font-weight:700;color:#333">シールブック</div><div style="font-size:10px;color:#999;margin-top:2px" id="sl-cnt">あつめたシール：0まい</div></div></div></div>
<!-- FLASH -->
<div class="screen" id="s-flash"><div class="fw"><div class="srow"><span id="fc-n">1/10</span><span class="spts" id="fc-p">⭐ 0</span></div><div class="pw"><div class="pb" id="fc-pb" style="width:0%"></div></div><div class="fcc" id="fc-card" onclick="fcFlip()"><img class="fc-flag" id="fc-fi" src="" alt="こっき"><div class="fc-name" id="fc-nm" style="display:none"></div><div class="fc-ruby" id="fc-rb" style="display:none"></div><div class="fc-reg" id="fc-rg"></div><button class="vbtn" id="fc-vb" style="display:none" onclick="event.stopPropagation();speak(curSpeak)">🔊 よみあげ</button><div class="fc-hint" id="fc-ht">タップでこたえをみる</div></div><div class="fcnav"><button class="navbtn" onclick="fcMv(-1)">◀</button><span style="font-size:14px;font-weight:700;color:#888" id="fc-ct">1/10</span><button class="navbtn" onclick="fcMv(1)">▶</button></div><div style="margin-top:14px;display:flex;gap:8px"><button class="bbtn bm" style="flex:1" onclick="startFill()">✏️ もじあわせにチャレンジ！</button></div></div></div>
<!-- FILL -->

// STATE
let selR=new Set(['すべて']);
let seals=JSON.parse(localStorage.getItem('ks')||'[]');
let golds=JSON.parse(localStorage.getItem('kg')||'[]');
function save(){localStorage.setItem('ks',JSON.stringify(seals));localStorage.setItem('kg',JSON.stringify(golds))}
function pool(){return selR.has('すべて')?[...countries]:countries.filter(c=>selR.has(c.r))}
function shuf(a){return[...a].sort(()=>Math.random()-.5)}
function k2h(s){return s.replace(/[\u30A1-\u30F6]/g,m=>String.fromCharCode(m.charCodeAt(0)-0x60))}
let curSpeak='';
function speak(t){if(!('speechSynthesis'in window))return;const u=new SpeechSynthesisUtterance(t);u.lang='ja-JP';u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u)}
function updSeal(){
  const n=new Set([...seals,...golds]).size;
  document.getElementById('seal-n').textContent=n;
  document.getElementById('sl-cnt').textContent=`あつめたシール：${n}まい`;
}
function showScreen(id,ti){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('tb-title').innerHTML=`<button class="back-btn" onclick="showHome()">◀</button> ${ti}`;
  window.scrollTo(0,0);
}
function showHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-home').classList.add('active');
  document.getElementById('tb-title').innerHTML='🌍 くにのはたクイズ';
  updSeal();buildChips();window.scrollTo(0,0);
}
function buildChips(){
  const rs=['すべて','アジア','ヨーロッパ','アメリカ','アフリカ','オセアニア'];
  const ic={'すべて':'🌍','アジア':'🌏','ヨーロッパ':'🏰','アメリカ':'🌎','アフリカ':'🦁','オセアニア':'🦘'};
  const el=document.getElementById('rchips');el.innerHTML='';
  rs.forEach(r=>{const b=document.createElement('button');b.className='chip'+(selR.has(r)?' on':'');b.textContent=ic[r]+' '+r;b.onclick=()=>{if(r==='すべて'){selR.clear();selR.add('すべて')}else{selR.delete('すべて');selR.has(r)?selR.delete(r):selR.add(r);if(!selR.size)selR.add('すべて')}buildChips()};el.appendChild(b)});
}

// FLASH
let fcL=[],fcI=0,fcFl=false,fcPt=0;
function startFlash(){fcL=shuf(pool());fcI=0;fcPt=0;fcFl=false;showScreen('s-flash','🃏 フラッシュカード');rfcQ()}
function rfcQ(){
  fcFl=false;const c=fcL[fcI];const t=fcL.length;
  document.getElementById('fc-fi').src=IMG+c.img;
  ['fc-nm','fc-rb'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('fc-vb').style.display='none';document.getElementById('fc-ht').style.display='block';
  document.getElementById('fc-rg').textContent=c.r;
  document.getElementById('fc-n').textContent=`${fcI+1}/${t}`;document.getElementById('fc-ct').textContent=`${fcI+1}/${t}`;
  document.getElementById('fc-pb').style.width=((fcI/t)*100)+'%';document.getElementById('fc-p').textContent=`⭐ ${fcPt}`;curSpeak=c.n;
}
function fcFlip(){
  if(fcFl)return;fcFl=true;const c=fcL[fcI];
  const ne=document.getElementById('fc-nm');ne.style.display='block';ne.textContent=c.k;ne.classList.add('bounce');setTimeout(()=>ne.classList.remove('bounce'),500);
  document.getElementById('fc-rb').style.display='block';document.getElementById('fc-rb').textContent='（'+c.n+'）';
  document.getElementById('fc-vb').style.display='flex';document.getElementById('fc-ht').style.display='none';
  fcPt++;document.getElementById('fc-p').textContent=`⭐ ${fcPt}`;speak(c.n);
}
function fcMv(d){fcI=Math.max(0,Math.min(fcL.length-1,fcI+d));if(d>0&&fcI>=fcL.length-1&&fcFl)setTimeout(endFlash,300);else rfcQ()}
function endFlash(){const s=earnSeal(fcL[Math.floor(Math.random()*fcL.length)]);save();updSeal();showResult(`${fcL.length}まいみたよ！`,fcPt,s,startFlash)}

// FILL
let fiL=[],fiI=0,fiPt=0,fiSC=0;
let fiAns=[],fiIn=[],fiBl=new Set(),fiSolv=false,hiCnt=0;
const KR=[['あ','い','う','え','お'],['か','き','く','け','こ'],['さ','し','す','せ','そ'],['た','ち','つ','て','と'],['な','に','ぬ','ね','の'],['は','ひ','ふ','へ','ほ'],['ま','み','む','め','も'],['や','ゆ','よ','わ','を'],['ら','り','る','れ','ろ'],['ぁ','っ','ん','ー','⌫'],['が','ぎ','ぐ','げ','ご'],['ざ','じ','ず','ぜ','ぞ'],['だ','ぢ','づ','で','ど'],['ば','び','ぶ','べ','ぼ'],['ぱ','ぴ','ぷ','ぺ','ぽ']];
const KT=[['ア','イ','ウ','エ','オ'],['カ','キ','ク','ケ','コ'],['サ','シ','ス','セ','ソ'],['タ','チ','ツ','テ','ト'],['ナ','ニ','ヌ','ネ','ノ'],['ハ','ヒ','フ','ヘ','ホ'],['マ','ミ','ム','メ','モ'],['ヤ','ユ','ヨ','ワ','ヲ'],['ラ','リ','ル','レ','ロ'],['ァ','ッ','ン','ー','⌫'],['ガ','ギ','グ','ゲ','ゴ'],['ザ','ジ','ズ','ゼ','ゾ'],['ダ','ヂ','ヅ','デ','ド'],['バ','ビ','ブ','ベ','ボ'],['パ','ピ','プ','ペ','ポ']];
function isKt(c){return/[\u30A0-\u30FF]/.test(c)}
function bKbd(w){
  const rows=[...w].some(isKt)?KT:KR;const nd=new Set([...w]);
  const kbd=document.getElementById('hkbd');kbd.innerHTML='';
  let bs=[];const seen=new Set();
  rows.forEach(r=>r.forEach(c=>{if((c==='⌫'||nd.has(c))&&!seen.has(c)){seen.add(c);bs.push(c)}}));
  if(!bs.includes('⌫'))bs.push('⌫');
  kbd.style.gridTemplateColumns=`repeat(${Math.min(bs.length,6)},1fr)`;
  bs.forEach(c=>{const b=document.createElement('button');b.className='kbtn'+(c==='⌫'?' kdel':'');b.textContent=c;b.onclick=()=>fiType(c);kbd.appendChild(b)});
}
function startFill(){fiL=shuf(pool());fiI=0;fiPt=0;fiSC=0;showScreen('s-fill','✏️ もじあわせ');rFiQ()}
function rFiQ(){
  fiSolv=false;hiCnt=0;const c=fiL[fiI];const w=c.n;
  document.getElementById('fi-fl').src=IMG+c.img;
  document.getElementById('fi-p').textContent=`⭐ ${fiPt}`;
  document.getElementById('fi-n').textContent=`もんだい ${fiI+1} / ${fiL.length}`;
  document.getElementById('fi-pb').style.width=((fiI/fiL.length)*100)+'%';
  document.getElementById('fi-fb').textContent='';document.getElementById('fi-fb').className='fi-fb';
  document.getElementById('hintbtn').disabled=false;document.getElementById('hintbtn').textContent='💡 ヒント';
  curSpeak=w;fiAns=[...w];fiIn=new Array(w.length).fill('');
  // pick blanks randomly, store SORTED (left to right)
  const nb=Math.max(1,Math.floor(w.length*.5));
  const picks=shuf([...Array(w.length).keys()]).slice(0,nb).sort((a,b)=>a-b);
  fiBl=new Set(picks);bKbd(w);rFiW();
}
function sBl(){return[...fiBl].sort((a,b)=>a-b)}
function rFiW(){
  const el=document.getElementById('fi-wd');el.innerHTML='';
  const fe=sBl().find(j=>!fiIn[j]);
  fiAns.forEach((ch,i)=>{
    const div=document.createElement('div');div.className='fich';
    if(!fiBl.has(i)){div.classList.add('shown');div.textContent=ch}
    else if(fiIn[i]){div.classList.add(fiIn[i]===ch?'ok':'blank');div.textContent=fiIn[i]}
    else{div.classList.add('blank');if(i===fe)div.classList.add('active')}
    el.appendChild(div);
  });
}
function fiType(ch){
  if(fiSolv)return;
  if(ch==='⌫'){const rev=sBl().filter(i=>fiIn[i]).reverse();if(rev.length){fiIn[rev[0]]='';rFiW()}return}
  const nxt=sBl().find(i=>!fiIn[i]);if(nxt===undefined)return;
  fiIn[nxt]=ch;rFiW();if(sBl().every(i=>fiIn[i]))chkFi();
}
function chkFi(){
  const ok=sBl().every(i=>fiIn[i]===fiAns[i]);
  const fb=document.getElementById('fi-fb');
  if(ok){
    fiSolv=true;fb.textContent='🎉 せいかい！';fb.className='fi-fb ok';fb.classList.add('bounce');
    fiPt+=Math.max(1,3-hiCnt);fiSC++;document.getElementById('fi-p').textContent=`⭐ ${fiPt}`;
    floatStar();speak(fiAns.join(''));
    if(fiSC%10===0)setTimeout(()=>showMS('rk',fiL[fiI]),600);
    else if(fiSC%5===0)setTimeout(()=>showMS('gj',fiL[fiI]),600);
    else setTimeout(advFi,1300);
  } else {
    fb.textContent='😅 もういちど！';fb.className='fi-fb ng';fb.classList.add('shake');
    setTimeout(()=>fb.classList.remove('shake'),400);
    sBl().forEach(i=>{if(fiIn[i]!==fiAns[i])fiIn[i]=''});rFiW();
  }
}
function advFi(){fiI++;if(fiI>=fiL.length)endFill();else rFiQ()}
function fillHint(){
  if(hiCnt>=2)return;hiCnt++;
  const un=sBl().filter(i=>!fiIn[i]);
  if(un.length){fiIn[un[0]]=fiAns[un[0]];rFiW();if(hiCnt>=2){document.getElementById('hintbtn').disabled=true;document.getElementById('hintbtn').textContent='💡 つかいきった'}if(sBl().every(i=>fiIn[i]))chkFi()}
}
function endFill(){save();updSeal();const s=earnSeal(fiL[Math.floor(Math.random()*fiL.length)]);showResult(`${fiL.length}もんとけたよ！`,fiPt,s,startFill,fiPt>=fiL.length*2)}

// MILESTONE
let msAnim=null;
function showMS(type,country){
  if(type==='gj'){
    const ov=document.getElementById('gj-ov');
    document.getElementById('gj-sub').textContent=`${fiSC}もんせいかい！🎉`;
    ov.classList.add('show');earnSeal(country);save();updSeal();runGJ();
    const done=()=>{ov.classList.remove('show');stopGJ();advFi()};
    document.getElementById('gj-cont').onclick=done;setTimeout(done,5000);
  } else {
    const ov=document.getElementById('rk-ov');ov.classList.add('show');
    earnGold(country);save();updSeal();runRK();
    const done=()=>{ov.classList.remove('show');stopRK();advFi()};
    document.getElementById('rk-cont').onclick=done;setTimeout(done,6000);
  }
}
let gjA=null,gjP=[];
function runGJ(){
  const cv=document.getElementById('gj-cv');cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');gjP=[];
  const cols=['#FFD93D','#FF6B9D','#4ECDC4','#FF8C42','#9B59B6','#fff','#6BCB77'];
  const add=()=>{for(let i=0;i<4;i++)gjP.push({x:Math.random()*cv.width,y:-10,vy:2+Math.random()*3,vx:(Math.random()-.5)*2,r:5+Math.random()*7,col:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*360,rv:(Math.random()-.5)*8,life:1})};
  const itv=setInterval(add,70);
  const fr=()=>{ctx.clearRect(0,0,cv.width,cv.height);gjP.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.life-=.008;ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.col;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore()});gjP=gjP.filter(p=>p.life>0);gjA={id:requestAnimationFrame(fr),itv}};
  fr();
}
function stopGJ(){if(gjA){cancelAnimationFrame(gjA.id);clearInterval(gjA.itv);gjA=null}const cv=document.getElementById('gj-cv');cv.getContext('2d').clearRect(0,0,cv.width,cv.height)}
let rkA=null;
function runRK(){
  const cv=document.getElementById('rk-cv');cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');const stars=[];
  for(let i=0;i<150;i++)stars.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:.5+Math.random()*2,a:Math.random()*Math.PI*2});
  const fr=()=>{ctx.clearRect(0,0,cv.width,cv.height);ctx.fillStyle='#080820';ctx.fillRect(0,0,cv.width,cv.height);stars.forEach(s=>{s.a+=.025;ctx.globalAlpha=.4+.6*Math.abs(Math.sin(s.a));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill()});ctx.globalAlpha=1;rkA=requestAnimationFrame(fr)};
  fr();
}
function stopRK(){if(rkA){cancelAnimationFrame(rkA);rkA=null}const cv=document.getElementById('rk-cv');cv.getContext('2d').clearRect(0,0,cv.width,cv.height)}

// TRACE
let trL=[],trI=0,trPt=0,trDr=false,trCtx=null;
const TC=['#FF4757','#2ed573','#1e90ff','#ffa502','#a29bfe','#fd79a8','#000'];
let tCol='#2ed573',tSz=12;
function startTrace(){trL=shuf(pool());trI=0;trPt=0;showScreen('s-trace','🖊️ なぞりがき');bCrow();bSzrow();initTr();rTrQ()}
function bCrow(){const el=document.getElementById('crow');el.innerHTML='';TC.forEach(c=>{const d=document.createElement('div');d.className='cdot'+(c===tCol?' on':'');d.style.background=c;d.onclick=()=>{tCol=c;bCrow()};el.appendChild(d)})}
function bSzrow(){const el=document.getElementById('szrow');el.innerHTML='';[8,12,18].forEach(s=>{const b=document.createElement('button');b.className='szbtn'+(s===tSz?' on':'');const d=document.createElement('div');d.style.cssText=`width:${s*.85}px;height:${s*.85}px;border-radius:50%;background:${s===tSz?'#fff':'#555'}`;b.appendChild(d);b.onclick=()=>{tSz=s;bSzrow()};el.appendChild(b)})}
function initTr(){
  const cv=document.getElementById('tr-cv');trCtx=cv.getContext('2d');const w=cv.offsetWidth||380;cv.width=w;
  ['mousedown','touchstart'].forEach(e=>cv.addEventListener(e,ev=>{trDr=true;const{x,y}=gPos(ev,cv);trCtx.beginPath();trCtx.moveTo(x,y);ev.preventDefault()},{passive:false}));
  ['mousemove','touchmove'].forEach(e=>cv.addEventListener(e,ev=>{if(!trDr)return;const{x,y}=gPos(ev,cv);trCtx.lineTo(x,y);trCtx.strokeStyle=tCol;trCtx.lineWidth=tSz;trCtx.lineCap=trCtx.lineJoin='round';trCtx.stroke();trCtx.beginPath();trCtx.moveTo(x,y);ev.preventDefault()},{passive:false}));
  ['mouseup','touchend','mouseleave'].forEach(e=>cv.addEventListener(e,()=>trDr=false));
}
function gPos(e,cv){const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy}}
function trClear(){if(!trCtx)return;const cv=document.getElementById('tr-cv');trCtx.clearRect(0,0,cv.width,cv.height);if(!trL[trI])return;trCtx.font=`bold ${Math.floor(cv.height*.5)}px 'Noto Sans JP',sans-serif`;trCtx.textAlign='center';trCtx.textBaseline='middle';trCtx.fillStyle='rgba(200,200,200,.4)';trCtx.fillText(trL[trI].n,cv.width/2,cv.height/2)}
function rTrQ(){const c=trL[trI];if(!c)return;document.getElementById('tr-fl').src=IMG+c.img;document.getElementById('tr-gd').textContent=c.n;document.getElementById('tr-pr').textContent=`「${c.n}」をなぞってかいてみよう！`;document.getElementById('tr-n').textContent=`${trI+1} / ${trL.length}`;document.getElementById('tr-pb').style.width=((trI/trL.length)*100)+'%';document.getElementById('tr-p').textContent=`⭐ ${trPt}`;trClear();speak(c.n)}
function trNext(){trPt++;document.getElementById('tr-p').textContent=`⭐ ${trPt}`;floatStar();trI++;if(trI>=trL.length){save();updSeal();const s=earnSeal(trL[Math.floor(Math.random()*trL.length)]);showResult(`${trL.length}このくにをかいたよ！`,trPt,s,startTrace)}else rTrQ()}

// SEALS
function earnSeal(c){if(c&&!seals.includes(c.img)&&!golds.includes(c.img)){seals.push(c.img);return c}return null}
function earnGold(c){if(c&&!golds.includes(c.img)){golds.push(c.img);const i=seals.indexOf(c.img);if(i>-1)seals.splice(i,1);return c}return null}
function showSeals(){
  showScreen('s-seals','🏷️ シールブック');
  const n=new Set([...seals,...golds]).size;
  document.getElementById('sl-sub').textContent=`あつめたシール：${n}まい / ${countries.length}まい`;
  const bk=document.getElementById('sl-book');bk.innerHTML='';
  countries.forEach(c=>{
    const isG=golds.includes(c.img);const isE=seals.includes(c.img)||isG;
    const s=document.createElement('div');s.className='sl-slot'+(isG?' gold':isE?' earned':'');
    if(isE){s.innerHTML=`<img src="${IMG+c.img}" alt="${c.n}"><div class="sl-name">${c.n}</div><div class="sl-star">${isG?'✨':'⭐'}</div>`;s.onclick=()=>speak(c.n)}
    else s.innerHTML='<div class="sl-lock">?</div>';
    bk.appendChild(s);
  });
}

// DICTIONARY
const RD=[{l:'あ行',cs:'あいうえお'},{l:'か行',cs:'かきくけこがぎぐげご'},{l:'さ行',cs:'さしすせそざじずぜぞ'},{l:'た行',cs:'たちつてとだぢづでど'},{l:'な行',cs:'なにぬねの'},{l:'は行',cs:'はひふへほばびぶべぼぱぴぷぺぽ'},{l:'ま行',cs:'まみむめも'},{l:'や行',cs:'やゆよわ'},{l:'ら行',cs:'らりるれろ'}];
let curRow='あ行';
function startDict(){showScreen('s-dict','📚 じてん');bDtFi();rDict()}
function bDtFi(){const el=document.getElementById('dt-fi');el.innerHTML='';RD.forEach(r=>{const b=document.createElement('button');b.className='rowbtn'+(r.l===curRow?' on':'');b.textContent=r.l;b.onclick=()=>{curRow=r.l;bDtFi();rDict()};el.appendChild(b)})}
function rDict(){
  const row=RD.find(r=>r.l===curRow);if(!row)return;
  const cs=new Set(row.cs);
  const sorted=[...countries].sort((a,b)=>{const ah=k2h(a.n),bh=k2h(b.n);return ah<bh?-1:ah>bh?1:0}).filter(c=>{const h=k2h(c.n)[0];return cs.has(h)});
  const g=document.getElementById('dt-grid');g.innerHTML='';
  if(!sorted.length){const p=document.createElement('p');p.style.cssText='color:#aaa;font-size:13px;text-align:center;grid-column:1/-1;padding:20px';p.textContent='このぎょうのくには ないよ';g.appendChild(p);return}
  sorted.forEach(c=>{const card=document.createElement('div');card.className='dt-card';card.innerHTML=`<img src="${IMG+c.img}" alt="${c.n}"><div class="dt-kana">（${c.n}）</div><div class="dt-name">${c.k}</div>`;card.onclick=()=>openDM(c);g.appendChild(card)});
}
function openDM(c){
  document.getElementById('dm-fl').src=IMG+c.img;document.getElementById('dm-na').textContent=c.k;document.getElementById('dm-ru').textContent='（'+c.n+'）';document.getElementById('dm-re').textContent=c.r;document.getElementById('dm-de').textContent=c.d;
  document.getElementById('dm-map').onclick=()=>window.open('https://www.google.com/maps/place/'+encodeURIComponent(c.k),'_blank');
  document.getElementById('dm-bg').classList.add('show');speak(c.n);
}
function closeDM(e){if(!e||e.target===document.getElementById('dm-bg'))document.getElementById('dm-bg').classList.remove('show')}

// RESULT
function showResult(msg,pts,s,ag,pf=false){
  const bg=document.getElementById('res-bg');
  document.getElementById('res-em').textContent=pf?'🏆':pts>5?'🌟':'😊';
  document.getElementById('res-ti').textContent=pf?'かんぺき！！！':pts>5?'すごい！':'よくできました！';
  document.getElementById('res-bo').textContent=msg+`\n⭐ ${pts}てん！`;
  const nw=document.getElementById('nsw');
  if(s){nw.style.display='block';document.getElementById('nsi').src=IMG+s.img}else nw.style.display='none';
  document.getElementById('res-next').onclick=()=>{bg.classList.remove('show');stopFW();ag()};
  bg.classList.add('show');if(pf)launchFW();
}
let fwA=null,fwP=[];
function launchFW(){
  const cv=document.getElementById('fw-cv');cv.style.display='block';cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');fwP=[];const cols=['#FF6B9D','#FFD93D','#4ECDC4','#FF8C42','#9B59B6','#6BCB77'];
  function burst(x,y){for(let i=0;i<36;i++){const a=(i/36)*Math.PI*2,sp=3+Math.random()*5;fwP.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,col:cols[Math.floor(Math.random()*6)],r:4+Math.random()*4,life:1})}}
  let sh=0;const itv=setInterval(()=>{if(sh<8){burst(Math.random()*cv.width,cv.height*(.2+Math.random()*.4));sh++}},500);burst(cv.width/2,cv.height*.3);
  const fr=()=>{ctx.clearRect(0,0,cv.width,cv.height);fwP.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.014;ctx.globalAlpha=Math.max(0,p.life);ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill()});ctx.globalAlpha=1;fwP=fwP.filter(p=>p.life>0);fwA=requestAnimationFrame(fr)};
  fr();setTimeout(()=>{clearInterval(itv);stopFW()},5000);
}
function stopFW(){if(fwA){cancelAnimationFrame(fwA);fwA=null}document.getElementById('fw-cv').style.display='none'}
function floatStar(){const s=document.createElement('div');s.className='fstar';s.textContent='⭐';s.style.left=(30+Math.random()*40)+'vw';s.style.top='60vh';document.body.appendChild(s);setTimeout(()=>s.remove(),1000)}

// INIT
buildChips();updSeal();
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
