<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌍 くにのはたクイズ</title>
<meta name="theme-color" content="#FFF9F0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="くにのはた">
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap');

:root {
  --sky: #e8f4fd;
  --sun: #FFD93D;
  --pink: #FF6B9D;
  --mint: #4ECDC4;
  --purple: #9B59B6;
  --orange: #FF8C42;
  --green: #6BCB77;
  --red: #FF4757;
  --bg: #FFF9F0;
  --card: #FFFFFF;
  --shadow: 0 4px 16px rgba(0,0,0,0.10);
  --radius: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== STARS BACKGROUND ===== */
.stars-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: linear-gradient(180deg, #ffecd2 0%, #fcb69f 30%, #ffecd2 60%, #fff9f0 100%);
  opacity: 0.25;
}

/* ===== SCREENS ===== */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: block; }

/* ===== TOP BAR ===== */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; position: sticky; top: 0; z-index: 100;
  background: rgba(255,249,240,0.95); backdrop-filter: blur(8px);
  border-bottom: 2px solid #FFE0B2;
}
.topbar-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 18px; font-weight: 700;
  color: #E65100;
  display: flex; align-items: center; gap: 6px;
}
.topbar-seals {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; font-weight: 700; color: #555;
}
.seal-count {
  background: var(--sun); color: #7B5800;
  border-radius: 99px; padding: 2px 10px;
  font-size: 14px; font-weight: 900;
}

/* ===== HOME SCREEN ===== */
#home {
  max-width: 480px; margin: 0 auto;
  padding: 24px 16px 40px;
  text-align: center;
}
.home-mascot {
  font-size: 80px; margin: 0 auto 8px;
  animation: mascot-float 3s ease-in-out infinite;
  display: block; line-height: 1;
}
@keyframes mascot-float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.home-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 32px; font-weight: 700;
  color: #E65100;
  line-height: 1.2; margin-bottom: 4px;
}
.home-sub {
  font-size: 14px; color: #888; margin-bottom: 28px;
}
.mode-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 20px;
}
.mode-card {
  background: var(--card); border-radius: var(--radius);
  border: 3px solid transparent;
  padding: 18px 10px;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
  text-align: center;
}
.mode-card:active { transform: scale(0.96); }
.mode-card .icon { font-size: 40px; display: block; margin-bottom: 8px; }
.mode-card .label {
  font-size: 15px; font-weight: 700; color: #333;
  line-height: 1.3;
}
.mode-card .label-sub { font-size: 11px; color: #999; margin-top: 3px; }
.mode-card.c-flash { border-color: var(--mint); }
.mode-card.c-fill  { border-color: var(--pink); }
.mode-card.c-trace { border-color: var(--purple); }
.mode-card.c-voice { border-color: var(--orange); }
.mode-card.c-seals { border-color: var(--sun); grid-column: 1/-1; }
.home-region-label { font-size: 13px; font-weight: 700; color: #888; margin-bottom: 8px; }
.region-chips {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-bottom: 20px;
}
.chip {
  padding: 6px 14px; border-radius: 99px;
  border: 2px solid #ddd; background: #fff;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all 0.15s; color: #555;
}
.chip.on { background: var(--mint); border-color: var(--mint); color: #fff; }

/* ===== FLASH CARD SCREEN ===== */
#flash { max-width: 480px; margin: 0 auto; padding: 16px; }
.fc-card {
  background: var(--card); border-radius: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  padding: 24px 20px; text-align: center;
  margin-bottom: 16px; cursor: pointer;
  transition: transform 0.2s;
  min-height: 280px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.fc-card:active { transform: scale(0.98); }
.fc-flag { max-width: 240px; max-height: 150px; width: 100%; object-fit: contain; border-radius: 8px; border: 1px solid #eee; }
.fc-name {
  font-family: 'Kaisei Decol', serif;
  font-size: 28px; font-weight: 700; color: #222;
  margin-top: 12px; line-height: 1.2;
}
.fc-ruby { font-size: 14px; color: #888; margin-top: 4px; }
.fc-region { font-size: 12px; color: #bbb; margin-top: 6px; }
.fc-tap-hint { font-size: 13px; color: #ccc; margin-top: 16px; }
.fc-nav {
  display: flex; gap: 10px; align-items: center; justify-content: center;
}
.nav-btn {
  width: 52px; height: 52px; border-radius: 50%;
  border: none; font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: var(--card); box-shadow: var(--shadow);
  transition: transform 0.1s;
}
.nav-btn:active { transform: scale(0.9); }
.fc-counter { font-size: 15px; font-weight: 700; color: #888; }
.voice-btn {
  background: var(--orange); border: none; border-radius: 99px;
  padding: 8px 18px; color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; margin-top: 10px;
  display: flex; align-items: center; gap: 6px; margin: 10px auto 0;
  font-family: inherit;
}
.voice-btn:active { transform: scale(0.95); }

/* ===== FILL SCREEN ===== */
#fill { max-width: 480px; margin: 0 auto; padding: 16px; }
.fill-flag-wrap {
  display: flex; justify-content: center; margin-bottom: 16px;
}
.fill-flag {
  max-width: 220px; max-height: 140px; width: 100%;
  object-fit: contain; border-radius: 10px; border: 1px solid #eee;
  box-shadow: var(--shadow);
}
.fill-prompt {
  font-size: 16px; color: #666; text-align: center; margin-bottom: 12px;
}
.fill-word-display {
  display: flex; gap: 6px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 20px;
}
.fill-char {
  width: 44px; height: 52px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700;
  position: relative; transition: all 0.2s;
}
.fill-char.blank {
  background: #f5f5f5; border: 2px dashed #ccc;
}
.fill-char.blank.active {
  background: #fff0f5; border: 2px solid var(--pink);
  box-shadow: 0 0 0 3px rgba(255,107,157,0.2);
}
.fill-char.revealed {
  background: linear-gradient(135deg, #f0fff4, #dcfce7);
  border: 2px solid var(--green); color: var(--green);
}
.fill-char.shown { background: #f0f4ff; border: 2px solid #c7d2fe; color: #4338ca; }
.ruby-small { font-size: 9px; color: #aaa; position: absolute; top: -14px; width: 100%; text-align: center; }
.hiragana-kbd {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 6px; margin-bottom: 12px;
}
.kana-btn {
  height: 46px; border-radius: 12px;
  border: 2px solid #e5e7eb;
  background: var(--card); font-size: 18px; font-weight: 700;
  cursor: pointer; transition: all 0.1s; color: #333;
  font-family: inherit;
}
.kana-btn:active { transform: scale(0.92); background: var(--pink); color: #fff; border-color: var(--pink); }
.kana-del {
  background: #fee2e2; border-color: #fca5a5; color: var(--red);
  font-size: 14px;
}
.fill-feedback {
  text-align: center; font-size: 20px; font-weight: 900;
  min-height: 32px; margin-bottom: 10px;
  transition: all 0.2s;
}
.fill-feedback.ok { color: var(--green); }
.fill-feedback.ng { color: var(--red); }
.progress-wrap {
  background: #eee; border-radius: 99px; height: 10px;
  margin-bottom: 12px; overflow: hidden;
}
.progress-bar {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--mint), var(--purple));
  transition: width 0.4s ease;
}
.score-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; font-weight: 700; color: #888; margin-bottom: 10px;
}
.score-pts { color: var(--orange); font-size: 16px; }

/* ===== TRACE SCREEN ===== */
#trace { max-width: 480px; margin: 0 auto; padding: 16px; text-align: center; }
.trace-name {
  font-family: 'Kaisei Decol', serif;
  font-size: 36px; font-weight: 700; color: #eee;
  margin-bottom: 8px; position: relative; display: inline-block;
  -webkit-text-stroke: 2px #ddd;
}
.trace-wrap {
  position: relative; display: inline-block; width: 100%;
  margin-bottom: 16px;
}
.trace-canvas {
  border-radius: 16px; border: 3px solid #e5e7eb;
  background: #fff; display: block; width: 100%; touch-action: none;
}
.trace-flag {
  max-width: 160px; max-height: 100px; width: 100%;
  object-fit: contain; border-radius: 8px; border: 1px solid #eee;
  margin: 0 auto 12px; display: block;
}
.trace-prompt { font-size: 15px; color: #888; margin-bottom: 12px; }
.trace-word { font-size: 28px; color: #ddd; letter-spacing: 4px; font-weight: 700; margin-bottom: 8px; }
.clear-btn {
  background: #fee2e2; border: 2px solid #fca5a5; border-radius: 12px;
  padding: 8px 18px; font-size: 14px; font-weight: 700;
  color: var(--red); cursor: pointer; font-family: inherit;
  margin-right: 8px;
}
.trace-size-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
.size-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid #ddd; background: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #888; transition: all 0.15s;
}
.size-btn.on { background: var(--purple); border-color: var(--purple); color: #fff; }
.color-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
.color-dot {
  width: 32px; height: 32px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer;
  transition: transform 0.15s;
}
.color-dot.on { border-color: #333; transform: scale(1.15); }

/* ===== SEALS SCREEN ===== */
#seals { max-width: 480px; margin: 0 auto; padding: 16px; }
.seals-header {
  text-align: center; margin-bottom: 20px;
}
.seals-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 24px; font-weight: 700; color: #E65100;
}
.seals-sub { font-size: 13px; color: #888; }
.seals-book {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.seal-slot {
  aspect-ratio: 1; border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 2px dashed #ddd; background: #fafafa;
  position: relative; overflow: hidden;
  cursor: pointer; transition: transform 0.15s;
}
.seal-slot:active { transform: scale(0.96); }
.seal-slot.earned {
  border: 2px solid var(--sun);
  background: linear-gradient(135deg, #fffbeb, #fef3c7);
  box-shadow: 0 2px 8px rgba(255,211,61,0.3);
}
.seal-slot img { width: 70%; height: 70%; object-fit: contain; border-radius: 4px; }
.seal-slot .seal-name { font-size: 9px; font-weight: 700; color: #888; margin-top: 2px; text-align: center; line-height: 1.1; }
.seal-slot .seal-lock { font-size: 22px; color: #ccc; }
.seal-slot .seal-star {
  position: absolute; top: 2px; right: 2px; font-size: 12px;
}
.seal-slot.earned .seal-name { color: #92400e; }

/* ===== RESULT / FIREWORKS ===== */
#fireworks-canvas {
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none; display: none;
}
.result-overlay {
  position: fixed; inset: 0; z-index: 9998;
  background: rgba(0,0,0,0.55); display: none;
  align-items: center; justify-content: center;
}
.result-overlay.show { display: flex; }
.result-card {
  background: #fff; border-radius: 28px;
  padding: 32px 28px; text-align: center;
  max-width: 320px; width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop-in {
  from { transform: scale(0.6); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
.result-emoji-big { font-size: 72px; display: block; margin-bottom: 8px; }
.result-title {
  font-family: 'Kaisei Decol', serif;
  font-size: 26px; font-weight: 700; color: #E65100; margin-bottom: 8px;
}
.result-body { font-size: 16px; color: #555; margin-bottom: 20px; line-height: 1.6; }
.result-new-seal { margin-bottom: 16px; }
.result-new-seal img { width: 64px; height: 64px; object-fit: contain; }
.result-btns { display: flex; gap: 10px; justify-content: center; }
.r-btn {
  padding: 12px 20px; border-radius: 99px; border: none;
  font-family: inherit; font-size: 15px; font-weight: 700;
  cursor: pointer; transition: transform 0.1s;
}
.r-btn:active { transform: scale(0.95); }
.r-btn.primary { background: var(--mint); color: #fff; }
.r-btn.secondary { background: #f3f4f6; color: #555; }

/* ===== BACK BTN ===== */
.back-btn {
  background: none; border: none; font-size: 22px;
  cursor: pointer; padding: 4px; border-radius: 8px;
  transition: background 0.1s;
}
.back-btn:active { background: #eee; }

/* ===== COMMON BTNS ===== */
.big-btn {
  display: block; width: 100%;
  padding: 16px; border-radius: 16px; border: none;
  font-family: inherit; font-size: 18px; font-weight: 900;
  cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 4px 0 rgba(0,0,0,0.15);
  letter-spacing: 0.03em;
}
.big-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
.big-btn.mint   { background: var(--mint); color: #fff; }
.big-btn.pink   { background: var(--pink); color: #fff; }
.big-btn.orange { background: var(--orange); color: #fff; }
.big-btn.purple { background: var(--purple); color: #fff; }

/* ===== BONUS ANIMATION ===== */
.bounce-in { animation: bounce-in 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes bounce-in {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.shake { animation: shake 0.4s; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

/* ===== STAR FLOATING ===== */
.float-star {
  position: fixed; pointer-events: none; z-index: 9997;
  font-size: 28px; animation: float-up 1s ease-out forwards;
}
@keyframes float-up {
  from { transform: translateY(0) scale(1); opacity: 1; }
  to   { transform: translateY(-80px) scale(1.3); opacity: 0; }
}

/* ===== HINT BTN ===== */
.hint-btn {
  background: #fffbeb; border: 2px solid var(--sun);
  border-radius: 99px; padding: 6px 14px;
  font-size: 13px; font-weight: 700; color: #92400e;
  cursor: pointer; font-family: inherit;
}
.hint-btn:active { background: var(--sun); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 99px; }
</style>
</head>
<body>
<div class="stars-bg"></div>
<canvas id="fireworks-canvas"></canvas>
<div class="result-overlay" id="result-overlay">
  <div class="result-card" id="result-card">
    <span class="result-emoji-big" id="result-emoji">🌟</span>
    <div class="result-title" id="result-title">すごい！</div>
    <div class="result-body" id="result-body"></div>
    <div class="result-new-seal" id="result-new-seal" style="display:none">
      <div style="font-size:13px;color:#888;margin-bottom:6px">🎁 あたらしいシールをゲット！</div>
      <img id="result-seal-img" src="" alt="">
    </div>
    <div class="result-btns">
      <button class="r-btn primary" id="result-next-btn">つぎへ</button>
      <button class="r-btn secondary" onclick="showHome()">ホーム</button>
    </div>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title" id="topbar-title">🌍 くにのはたクイズ</div>
  <div class="topbar-seals">🏷️ <span class="seal-count" id="seal-total">0</span></div>
</div>

<!-- HOME -->
<div class="screen active" id="home">
  <div style="max-width:480px;margin:0 auto;padding:24px 16px 40px;text-align:center;">
    <span class="home-mascot">🌎</span>
    <div class="home-title">くにのはた<br>クイズ！</div>
    <div class="home-sub">せかいのくにをおぼえよう</div>

    <div class="home-region-label">ちいきをえらぼう</div>
    <div class="region-chips" id="region-chips"></div>

    <div class="mode-grid">
      <div class="mode-card c-flash" onclick="startFlash()">
        <span class="icon">🃏</span>
        <div class="label">フラッシュカード<br><span class="label-sub">みておぼえよう</span></div>
      </div>
      <div class="mode-card c-fill" onclick="startFill()">
        <span class="icon">✏️</span>
        <div class="label">もじあわせ<br><span class="label-sub">こたえをいれよう</span></div>
      </div>
      <div class="mode-card c-trace" onclick="startTrace()">
        <span class="icon">🖊️</span>
        <div class="label">なぞりがき<br><span class="label-sub">もじをかこう</span></div>
      </div>
      <div class="mode-card c-seals" onclick="showSeals()">
        <span class="icon">📖</span>
        <div class="label">シールブック<br><span class="label-sub" id="seals-home-count">あつめたシール：0まい</span></div>
      </div>
    </div>
  </div>
</div>

<!-- FLASH CARD -->
<div class="screen" id="flash">
  <div style="max-width:480px;margin:0 auto;padding:16px;">
    <div class="score-row">
      <span id="fc-num">1 / 10</span>
      <span class="score-pts" id="fc-pts">⭐ 0</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="fc-prog" style="width:0%"></div></div>

    <div class="fc-card" id="fc-card" onclick="fcFlip()">
      <img class="fc-flag" id="fc-flag-img" src="" alt="こっき">
      <div class="fc-name" id="fc-name" style="display:none"></div>
      <div class="fc-ruby" id="fc-ruby" style="display:none"></div>
      <div class="fc-region" id="fc-region"></div>
      <button class="voice-btn" id="fc-voice-btn" style="display:none" onclick="event.stopPropagation();speakName()">
        🔊 よみあげ
      </button>
      <div class="fc-tap-hint" id="fc-tap-hint">タップでこたえをみる</div>
    </div>

    <div class="fc-nav">
      <button class="nav-btn" onclick="fcPrev()">◀</button>
      <span class="fc-counter" id="fc-counter">1 / 10</span>
      <button class="nav-btn" onclick="fcNext()">▶</button>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px;">
      <button class="big-btn mint" style="flex:1" onclick="startFill()">✏️ もじあわせにチャレンジ！</button>
    </div>
  </div>
</div>

<!-- FILL / 穴あき -->
<div class="screen" id="fill">
  <div style="max-width:480px;margin:0 auto;padding:16px;">
    <div class="score-row">
      <span id="fill-num">もんだい 1 / 10</span>
      <span class="score-pts" id="fill-pts">⭐ 0</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="fill-prog" style="width:0%"></div></div>

    <div class="fill-flag-wrap">
      <img class="fill-flag" id="fill-flag-img" src="" alt="こっき">
    </div>
    <div class="fill-prompt">この くにの なまえは？</div>
    <div class="fill-word-display" id="fill-word-display"></div>
    <div class="fill-feedback" id="fill-feedback"></div>

    <div class="hiragana-kbd" id="hira-kbd"></div>
    <div style="display:flex;gap:8px;margin-top:6px;">
      <button class="hint-btn" id="hint-btn" onclick="fillHint()">💡 ヒント</button>
      <button class="voice-btn" onclick="speakFillName()" style="margin:0;">🔊 よみあげ</button>
    </div>
  </div>
</div>

<!-- TRACE -->
<div class="screen" id="trace">
  <div style="max-width:480px;margin:0 auto;padding:16px;text-align:center;">
    <div class="score-row">
      <span id="trace-num">1 / 10</span>
      <span class="score-pts" id="trace-pts">⭐ 0</span>

        selectedRegions.clear(); selectedRegions.add('すべて');
      } else {
        selectedRegions.delete('すべて');

        else selectedRegions.add(r);

  });
}

// ===== FILL (穴あき) =====
let fillList = [], fillIdx = 0, fillPts = 0;
let fillAnswer = [], fillInput = [], fillBlanks = [], fillSolved = false;
let hintCount = 0;

const kanaRows = [
  ['あ','い','う','え','お'],
  ['か','き','く','け','こ'],
  ['さ','し','す','せ','そ'],
  ['た','ち','つ','て','と'],
  ['な','に','ぬ','ね','の'],
  ['は','ひ','ふ','へ','ほ'],
  ['ま','み','む','め','も'],
  ['や','ゆ','よ','わ','を'],
  ['ら','り','る','れ','ろ'],
  ['ぁ','っ','ん','ー','⌫'],
  ['が','ぎ','ぐ','げ','ご'],
  ['ざ','じ','ず','ぜ','ぞ'],
  ['だ','ぢ','づ','で','ど'],
  ['ば','び','ぶ','べ','ぼ'],
  ['ぱ','ぴ','ぷ','ぺ','ぽ'],
];
// Katakana rows
const kataRows = [
  ['ア','イ','ウ','エ','オ'],
  ['カ','キ','ク','ケ','コ'],
  ['サ','シ','ス','セ','ソ'],
  ['タ','チ','ツ','テ','ト'],
  ['ナ','ニ','ヌ','ネ','ノ'],
  ['ハ','ヒ','フ','ヘ','ホ'],
  ['マ','ミ','ム','メ','モ'],
  ['ヤ','ユ','ヨ','ワ','ヲ'],
  ['ラ','リ','ル','レ','ロ'],
  ['ァ','ッ','ン','ー','⌫'],
  ['ガ','ギ','グ','ゲ','ゴ'],
  ['ザ','ジ','ズ','ゼ','ゾ'],
  ['ダ','ヂ','ヅ','デ','ド'],
  ['バ','ビ','ブ','ベ','ボ'],
  ['パ','ピ','プ','ペ','ポ'],
];

function isKatakana(ch) { return /[\u30A0-\u30FF]/.test(ch); }

function buildKbd(word) {
  // detect if word contains katakana
  const hasKata = [...word].some(isKatakana);
  const rows = hasKata ? kataRows : kanaRows;
  // Build keyboard with only chars that appear in word + del
  const needed = new Set([...word]);
  const kbd = document.getElementById('hira-kbd');
  kbd.innerHTML = '';
  // Flatten needed + delete
  let btns = [];
  rows.forEach(row => {
    row.forEach(ch => {
      if(ch === '⌫' || needed.has(ch)) btns.push(ch);
    });
  });
  // Deduplicate, keep order
  const seen = new Set();
  btns = btns.filter(b => { if(seen.has(b)) return false; seen.add(b); return true; });
  // Always add ⌫ if not already
  if(!btns.includes('⌫')) btns.push('⌫');

  // Adjust grid columns
  const cols = Math.min(btns.length, 6);
  kbd.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  btns.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'kana-btn' + (ch==='⌫'?' kana-del':'');
    btn.textContent = ch;
    btn.onclick = () => fillType(ch);
    kbd.appendChild(btn);
  });
}

function startFill() {
  fillList = shuffle(getPool());
  fillIdx = 0; fillPts = 0;
  showScreen('fill','✏️ もじあわせ');
  document.getElementById('topbar-title').innerHTML =
    '<button class="back-btn" onclick="showHome()">◀</button> ✏️ もじあわせ';
  renderFillQ();
}

function renderFillQ() {
  fillSolved = false; hintCount = 0;
  const c = fillList[fillIdx];
  const word = c.n; // hiragana/katakana
  document.getElementById('fill-flag-img').src = IMG + c.img;
  document.getElementById('fill-pts').textContent = `⭐ ${fillPts}`;
  document.getElementById('fill-num').textContent = `もんだい ${fillIdx+1} / ${fillList.length}`;
  document.getElementById('fill-prog').style.width = ((fillIdx/fillList.length)*100)+'%';
  document.getElementById('fill-feedback').textContent = '';
  document.getElementById('fill-feedback').className = 'fill-feedback';
  document.getElementById('hint-btn').disabled = false;
  document.getElementById('hint-btn').textContent = '💡 ヒント';
  currentSpeakText = word;

  // Create blanks: hide ~half of chars
  fillAnswer = [...word];
  fillInput = new Array(word.length).fill('');
  fillBlanks = [];
  const numBlanks = Math.max(1, Math.floor(word.length * 0.5));
  let idxArr = [...Array(word.length).keys()];
  let shuffled = shuffle(idxArr).slice(0, numBlanks);
  fillBlanks = new Set(shuffled);

  buildKbd(word);
  renderFillWord();
}

function renderFillWord() {
  const el = document.getElementById('fill-word-display');
  el.innerHTML = '';
  fillAnswer.forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'fill-char';
    if(!fillBlanks.has(i)) {
      div.classList.add('shown');
      div.textContent = ch;
    } else if(fillInput[i]) {
      div.classList.add(fillInput[i] === ch ? 'revealed' : 'blank');
      div.textContent = fillInput[i];
    } else {
      div.classList.add('blank');
      // find first empty blank
      const firstEmpty = [...fillBlanks].find(j => !fillInput[j]);
      if(i === firstEmpty) div.classList.add('active');
      div.textContent = '';
    }
    el.appendChild(div);
  });
}

function fillType(ch) {
  if(fillSolved) return;
  if(ch === '⌫') {
    // delete last filled blank
    const filled = [...fillBlanks].filter(i => fillInput[i]).reverse();
    if(filled.length > 0) { fillInput[filled[0]] = ''; renderFillWord(); }
    return;
  }
  const nextBlank = [...fillBlanks].find(i => !fillInput[i]);
  if(nextBlank === undefined) return;
  fillInput[nextBlank] = ch;
  renderFillWord();
  // Check if all blanks filled
  const allFilled = [...fillBlanks].every(i => fillInput[i]);
  if(allFilled) checkFill();
}

function checkFill() {
  const allCorrect = [...fillBlanks].every(i => fillInput[i] === fillAnswer[i]);
  const fb = document.getElementById('fill-feedback');
  if(allCorrect) {
    fillSolved = true;
    fb.textContent = '🎉 せいかい！'; fb.className = 'fill-feedback ok';
    fb.classList.add('bounce-in');
    const pts = Math.max(1, 3 - hintCount);
    fillPts += pts;
    document.getElementById('fill-pts').textContent = `⭐ ${fillPts}`;
    floatStar();
    speak(fillAnswer.join(''));
    setTimeout(() => {
      fillIdx++;
      if(fillIdx >= fillList.length) showFillResult();
      else renderFillQ();
    }, 1400);
  } else {
    fb.textContent = '😅 もういちど！'; fb.className = 'fill-feedback ng';
    fb.classList.add('shake');
    setTimeout(()=>fb.classList.remove('shake'), 400);
    // reset wrong inputs
    [...fillBlanks].forEach(i => { if(fillInput[i] !== fillAnswer[i]) fillInput[i]=''; });
    renderFillWord();
  }
}

function fillHint() {
  if(hintCount >= 2) return;
  hintCount++;
  // Reveal one blank
  const unrevealed = [...fillBlanks].filter(i => !fillInput[i]);
  if(unrevealed.length > 0) {
    const pick = unrevealed[0];
    fillInput[pick] = fillAnswer[pick];
    renderFillWord();
    if(hintCount >= 2) {
      document.getElementById('hint-btn').disabled = true;
      document.getElementById('hint-btn').textContent = '💡 つかいきった';
    }
    const allFilled = [...fillBlanks].every(i => fillInput[i]);
    if(allFilled) checkFill();
  }
}
function speakFillName() { speak(currentSpeakText); }

function showFillResult() {
  totalPts += fillPts;
  const newSeal = tryEarnSeal(fillList[Math.floor(Math.random()*fillList.length)]);
  saveState(); updateSealCount();
  const allCorrect = fillPts >= fillList.length * 2;
  showResult(
    allCorrect ? `ぜんもんせいかい！！！` : `${fillList.length}もんとけたよ！`,
    fillPts, newSeal, startFill, allCorrect
  );
}

let traceList = [], traceIdx = 0, tracePts = 0;
let traceDrawing = false;
let traceCtx = null;
const traceColors = ['#FF4757','#2ed573','#1e90ff','#ffa502','#a29bfe','#fd79a8','#000000'];
let traceColor = '#2ed573';
let traceSize = 12;
const traceSizes = [8, 12, 18];

function startTrace() {
  traceList = shuffle(getPool());
  traceIdx = 0; tracePts = 0;
  showScreen('trace','🖊️ なぞりがき');
  document.getElementById('topbar-title').innerHTML =
    '<button class="back-btn" onclick="showHome()">◀</button> 🖊️ なぞりがき';

  buildSizeRow();

function buildColorRow() {
  const el = document.getElementById('color-row');
  el.innerHTML = '';
  traceColors.forEach(c => {
    const d = document.createElement('div');
    d.className = 'color-dot' + (c === traceColor ? ' on' : '');
    d.style.background = c;
    d.onclick = () => { traceColor = c; buildColorRow(); };
    el.appendChild(d);
  });
}
function buildSizeRow() {
  const el = document.getElementById('size-row');
  el.innerHTML = '';
  traceSizes.forEach(s => {
    const b = document.createElement('button');
    b.className = 'size-btn' + (s === traceSize ? ' on' : '');
    const dot = document.createElement('div');
    dot.style.cssText = `width:${s*0.9}px;height:${s*0.9}px;border-radius:50%;background:#555`;
    b.appendChild(dot);
    b.onclick = () => { traceSize = s; buildSizeRow(); };
    el.appendChild(b);
  });
}

function initTraceCanvas() {
  const canvas = document.getElementById('trace-canvas');
  traceCtx = canvas.getContext('2d');
  // Resize to actual width
  const w = canvas.offsetWidth || 400;
  canvas.width = w; canvas.height = 160;
  traceClear();

  ['mousedown','touchstart'].forEach(ev => {
    canvas.addEventListener(ev, e => {
      traceDrawing = true;
      const {x,y} = getPos(e, canvas);
      traceCtx.beginPath(); traceCtx.moveTo(x,y);
      e.preventDefault();
    }, {passive:false});
  });
  ['mousemove','touchmove'].forEach(ev => {
    canvas.addEventListener(ev, e => {
      if(!traceDrawing) return;
      const {x,y} = getPos(e, canvas);
      traceCtx.lineTo(x,y);
      traceCtx.strokeStyle = traceColor;
      traceCtx.lineWidth = traceSize;
      traceCtx.lineCap = 'round'; traceCtx.lineJoin = 'round';
      traceCtx.stroke(); traceCtx.beginPath(); traceCtx.moveTo(x,y);
      e.preventDefault();
    }, {passive:false});
  });
  ['mouseup','touchend','mouseleave'].forEach(ev => {
    canvas.addEventListener(ev, () => { traceDrawing = false; });
  });
}

function getPos(e, canvas) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
}

function traceClear() {
  const canvas = document.getElementById('trace-canvas');
  if(!traceCtx) { traceCtx = canvas.getContext('2d'); }
  traceCtx.clearRect(0, 0, canvas.width, canvas.height);
  // Draw guide text
  const c = traceList[traceIdx];
  if(!c) return;
  traceCtx.font = `bold ${Math.floor(canvas.height * 0.55)}px 'Noto Sans JP',sans-serif`;
  traceCtx.textAlign = 'center'; traceCtx.textBaseline = 'middle';
  traceCtx.fillStyle = 'rgba(200,200,200,0.5)';
  traceCtx.fillText(c.n, canvas.width/2, canvas.height/2);
}

function renderTraceQ() {
  if(!traceList[traceIdx]) return;
  const c = traceList[traceIdx];
  document.getElementById('trace-flag-img').src = IMG + c.img;
  document.getElementById('trace-guide').textContent = c.n;
  document.getElementById('trace-prompt').textContent = `「${c.n}」をなぞってかいてみよう！`;
  document.getElementById('trace-num').textContent = `${traceIdx+1} / ${traceList.length}`;
  document.getElementById('trace-prog').style.width = ((traceIdx/traceList.length)*100)+'%';
  document.getElementById('trace-pts').textContent = `⭐ ${tracePts}`;
  traceClear();
  speak(c.n);
}

function traceNext() {
  tracePts += 1;
  document.getElementById('trace-pts').textContent = `⭐ ${tracePts}`;
  floatStar();
  traceIdx++;
  if(traceIdx >= traceList.length) {
    totalPts += tracePts;
    const newSeal = tryEarnSeal(traceList[Math.floor(Math.random()*traceList.length)]);
    saveState(); updateSealCount();
    showResult(`${traceList.length}このくにをかいたよ！`, tracePts, newSeal, startTrace);
  } else {
    renderTraceQ();
  }
}

// ===== SEALS =====
function tryEarnSeal(country) {
  if(!earnedSeals.includes(country.img)) {
    earnedSeals.push(country.img);
    return country;
  }
  return null;
}

function showSeals() {
  showScreen('seals','🏷️ シールブック');
  document.getElementById('topbar-title').innerHTML =
    '<button class="back-btn" onclick="showHome()">◀</button> 🏷️ シールブック';
  const all = countries;
  document.getElementById('seals-sub').textContent =
    `あつめたシール：${earnedSeals.length}まい / ${all.length}まい`;
  const book = document.getElementById('seals-book');
  book.innerHTML = '';
  all.forEach(c => {
    const slot = document.createElement('div');
    slot.className = 'seal-slot' + (earnedSeals.includes(c.img) ? ' earned' : '');
    if(earnedSeals.includes(c.img)) {
      slot.innerHTML = `<img src="${IMG+c.img}" alt="${c.n}"><div class="seal-name">${c.n}</div><div class="seal-star">⭐</div>`;
      slot.onclick = () => speak(c.n);
    } else {
      slot.innerHTML = `<div class="seal-lock">?</div>`;
    }
    book.appendChild(slot);
  });
}

// ===== RESULT + FIREWORKS =====
function showResult(msg, pts, newSeal, againFn, isAllCorrect = false) {
  const overlay = document.getElementById('result-overlay');
  const emoji = document.getElementById('result-emoji');
  const title = document.getElementById('result-title');
  const body = document.getElementById('result-body');
  const newSealEl = document.getElementById('result-new-seal');
  const nextBtn = document.getElementById('result-next-btn');

  if(isAllCorrect) {
    emoji.textContent = '🏆'; title.textContent = 'かんぺき！！！';
    launchFireworks();
  } else if(pts > 5) {
    emoji.textContent = '🌟'; title.textContent = 'すごい！';
  } else {
    emoji.textContent = '😊'; title.textContent = 'よくできました！';
  }
  body.textContent = msg + `\n⭐ ${pts}てん ゲット！`;

  if(newSeal) {
    newSealEl.style.display = 'block';
    document.getElementById('result-seal-img').src = IMG + newSeal.img;
  } else {
    newSealEl.style.display = 'none';
  }

  nextBtn.onclick = () => {
    overlay.classList.remove('show');
    stopFireworks();
    againFn();
  };
  overlay.classList.add('show');
}

// ===== FIREWORKS =====
let fwAnimId = null;
let fwParticles = [];
function launchFireworks() {
  const canvas = document.getElementById('fireworks-canvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  fwParticles = [];
  const colors = ['#FF6B9D','#FFD93D','#4ECDC4','#FF8C42','#9B59B6','#6BCB77'];
  function burst(x, y) {
    for(let i = 0; i < 36; i++) {
      const angle = (i / 36) * Math.PI * 2;
      const speed = 3 + Math.random() * 5;
      fwParticles.push({
        x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed - 2,
        color: colors[Math.floor(Math.random()*colors.length)],
        r: 4 + Math.random()*4, life: 1,
      });
    }
  }
  let shots = 0;
  function shoot() {
    burst(Math.random()*canvas.width, canvas.height * (0.2 + Math.random()*0.4));
    shots++;
  }
  shoot(); shoot();
  const interval = setInterval(() => { if(shots < 8) { shoot(); shoot(); } }, 600);
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    fwParticles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.12;
      p.life -= 0.015;
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
    });
    ctx.globalAlpha = 1;
    fwParticles = fwParticles.filter(p => p.life > 0);
    fwAnimId = requestAnimationFrame(frame);
  }
  frame();
  setTimeout(() => { clearInterval(interval); stopFireworks(); }, 5000);
}
function stopFireworks() {
  if(fwAnimId) { cancelAnimationFrame(fwAnimId); fwAnimId = null; }
  document.getElementById('fireworks-canvas').style.display = 'none';
}

// ===== FLOAT STAR =====
function floatStar() {
  const star = document.createElement('div');
  star.className = 'float-star';
  star.textContent = '⭐';
  star.style.left = (30 + Math.random()*40) + 'vw';
  star.style.top = '60vh';
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 1000);
}
